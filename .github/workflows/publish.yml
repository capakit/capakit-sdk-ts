name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
      - "dev/v*.*.*-dev.*"
  workflow_dispatch:

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
          package-manager-cache: false

      - run: npm ci

      - run: npm run check

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$package_version" = "$tag_version"

      - run: npm publish --access public

  publish-dev:
    if: startsWith(github.ref, 'refs/tags/dev/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"
          package-manager-cache: false

      - run: npm ci

      - name: Stamp dev package version from tag
        run: |
          dev_version="${GITHUB_REF_NAME#dev/v}"
          npm version "$dev_version" --no-git-tag-version --allow-same-version

      - run: npm run check

      - run: npm publish --access public --tag dev
